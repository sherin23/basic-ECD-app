version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: foccai-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db

  web:
    build: .
    container_name: foccai-web
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - SECRET_KEY=${FLASK_SECRET_KEY}
    depends_on:
      - mongo
    restart: always

volumes:
  mongo-data:

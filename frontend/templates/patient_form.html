{% extends 'layout.html' %}
{% block content %}
<div class="mb-6">
    <a href="{{ url_for('dashboard') }}"
        style="color:var(--primary);text-decoration:none;font-weight:500;font-size:0.875rem;">← Back to Dashboard</a>
    <h1 class="mt-4">Create Patient Record</h1>
    <p>Enter the patient's basic demographic information.</p>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('create_patient') }}">
        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
        </div>
        <div class="form-group mb-6">
            <label class="form-label" for="age">Age</label>
            <input type="number" id="age" name="age" class="form-control" required min="1" max="150" placeholder="45">
        </div>
        <div class="flex justify-between mt-6">
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Patient</button>
        </div>
    </form>
</div>
{% endblock %}
